<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login - AI Box Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div style="max-width:400px;margin:100px auto;padding:24px;border:1px solid #ddd;border-radius:12px;background:#fff;">
        <h2 style="text-align:center;">AI Box Dashboard Login</h2>

        <div style="margin-top:16px;">
            <label>Username</label>
            <input type="text" id="username" style="width:100%;padding:10px;margin-top:6px;">
        </div>

        <div style="margin-top:16px;">
            <label>Password</label>
            <input type="password" id="password" style="width:100%;padding:10px;margin-top:6px;">
        </div>

        <button id="loginBtn" style="width:100%;margin-top:20px;padding:12px;">Login</button>

        <p id="errorMsg" style="color:red;margin-top:12px;"></p>
    </div>

    <script>
        document.getElementById("loginBtn").addEventListener("click", async () => {
            const username = document.getElementById("username").value.trim();
            const password = document.getElementById("password").value;
            const errorMsg = document.getElementById("errorMsg");

            errorMsg.innerText = "";

            try {
                const res = await fetch("/login", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({ username, password })
                });

                const data = await res.json();

                if (!res.ok) {
                    errorMsg.innerText = data.error || "Login failed";
                    return;
                }

                window.location.href = "/index.html";
            } catch (err) {
                errorMsg.innerText = "Network error";
            }
        });
    </script>
</body>
</html>
