<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>User Management</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="topbar">
     <div class="topbar-left">
  <button id="backToDashboardBtn" class="btn-icon" title="Back">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
    <path d="M15 18l-6-6 6-6"/>
  </svg>
</button>
  </div>

    <div class="topbar-center">
      <div class="topbar-dot"></div>
      <h1>User Management</h1>
    </div>

    <div class="topbar-right">
      <span class="topbar-username" id="currentUsername">admin</span>
      
      <button id="openCreateUserBtn" class="btn-create">Create User</button>
      <button class="btn-logout" id="logoutBtn" title="Logout">
        <svg viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M6 2H3a1 1 0 00-1 1v10a1 1 0 001 1h3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          <path d="M10 11l3-3-3-3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M13 8H7" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
      </button>
    </div>
  </div>

  <div class="dashboard-container">
    <div class="summary-section">
      <div>
        <h2 class="summary-title">User Summary</h2>
        <div class="summary">
          <div class="summary-card">
            <div>Total Users</div>
            <div class="value" id="totalUsers">0</div>
          </div>

          <div class="summary-card">
            <div class="online">Users</div>
            <div class="value" id="normalUsers">0</div>
          </div>

          <div class="summary-card">
            <div class="offline">Admins</div>
            <div class="value" id="adminUsers">0</div>
          </div>
        </div>
      </div>
    </div>

    <div class="table-section">
      <div class="table-header-actions">
        <h2 class="summary-title">User Accounts</h2>
      </div>

      <div class="table-responsive">
        <table>
          <thead>
            <tr>
              <th>No.</th>
              <th>Username</th>
              <th>Role</th>
              <th>Status</th>
              <th>Created At</th>
              <th>Updated At</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="userTable">
            <tr>
              <td colspan="7">Loading...</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- CREATE USER MODAL -->
  <div id="createUserModal" class="modal hidden">
    <div class="modal-content">
      <h2 class="history-heading">Create User Account</h2>

      <div class="modal-form">
        <div class="filter-group">
          <label>Username</label>
          <input type="text" id="newUsernameInput" placeholder="Enter username">
        </div>

        <div class="filter-group">
          <label>Password</label>
          <div class="password-field">
            <input type="password" id="newPasswordInput" class="password-input" placeholder="Enter password">
            <button type="button" class="password-toggle">
              <svg class="eye-open" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7S1 12 1 12z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
              <svg class="eye-off" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none;">
                <path d="M2 2l20 20"/>
                <path d="M10.58 10.58A2 2 0 0 0 12 14a2 2 0 0 0 1.42-.58"/>
                <path d="M9.88 4.24A10.94 10.94 0 0 1 12 4c7 0 11 8 11 8a21.8 21.8 0 0 1-5.08 5.94"/>
                <path d="M6.1 6.1A21.78 21.78 0 0 0 1 12s4 8 11 8a10.94 10.94 0 0 0 5.02-1.21"/>
              </svg>
            </button>
          </div>
        </div>

        <div class="filter-group">
          <label>Confirm Password</label>
          <div class="password-field">
            <input type="password" id="confirmPasswordInput" class="password-input" placeholder="Confirm password">
            <button type="button" class="password-toggle">
              <svg class="eye-open" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7S1 12 1 12z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
              <svg class="eye-off" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none;">
                <path d="M2 2l20 20"/>
                <path d="M10.58 10.58A2 2 0 0 0 12 14a2 2 0 0 0 1.42-.58"/>
                <path d="M9.88 4.24A10.94 10.94 0 0 1 12 4c7 0 11 8 11 8a21.8 21.8 0 0 1-5.08 5.94"/>
                <path d="M6.1 6.1A21.78 21.78 0 0 0 1 12s4 8 11 8a10.94 10.94 0 0 0 5.02-1.21"/>
              </svg>
            </button>
          </div>
        </div>
      </div>

      <div class="modal-buttons">
        <button id="saveNewUserBtn" class="btn-primary">Create</button>
        <button id="closeCreateUserModalBtn" class="btn-secondary">Cancel</button>
      </div>

      <p id="createUserMessage" style="margin-top:12px;"></p>
    </div>
  </div>

  <!-- EDIT USER MODAL -->
  <div id="editUserModal" class="modal hidden">
    <div class="modal-content">
      <h2 class="history-heading">Edit User Account</h2>

      <div class="modal-form">
        <input type="hidden" id="editUserId">

        <div class="filter-group">
          <label>Username</label>
          <input type="text" id="editUsernameInput" placeholder="Enter username">
        </div>

        <div class="filter-group">
          <label>New Password</label>
          <div class="password-field">
            <input type="password" id="editPasswordInput" class="password-input" placeholder="Leave blank to keep current password">
            <button type="button" class="password-toggle">
              <svg class="eye-open" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7S1 12 1 12z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
              <svg class="eye-off" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none;">
                <path d="M2 2l20 20"/>
                <path d="M10.58 10.58A2 2 0 0 0 12 14a2 2 0 0 0 1.42-.58"/>
                <path d="M9.88 4.24A10.94 10.94 0 0 1 12 4c7 0 11 8 11 8a21.8 21.8 0 0 1-5.08 5.94"/>
                <path d="M6.1 6.1A21.78 21.78 0 0 0 1 12s4 8 11 8a10.94 10.94 0 0 0 5.02-1.21"/>
              </svg>
            </button>
          </div>
        </div>

        <div class="filter-group">
          <label>Confirm New Password</label>
          <div class="password-field">
            <input type="password" id="editConfirmPasswordInput" class="password-input" placeholder="Confirm new password">
            <button type="button" class="password-toggle">
              <svg class="eye-open" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7S1 12 1 12z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
              <svg class="eye-off" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none;">
                <path d="M2 2l20 20"/>
                <path d="M10.58 10.58A2 2 0 0 0 12 14a2 2 0 0 0 1.42-.58"/>
                <path d="M9.88 4.24A10.94 10.94 0 0 1 12 4c7 0 11 8 11 8a21.8 21.8 0 0 1-5.08 5.94"/>
                <path d="M6.1 6.1A21.78 21.78 0 0 0 1 12s4 8 11 8a10.94 10.94 0 0 0 5.02-1.21"/>
              </svg>
            </button>
          </div>
        </div>
      </div>

      <div class="modal-buttons">
        <button id="saveEditUserBtn" class="btn-primary">Save</button>
        <button id="closeEditUserModalBtn" class="btn-secondary">Cancel</button>
      </div>

      <p id="editUserMessage" style="margin-top:12px;"></p>
    </div>
  </div>

  <script src="user-management.js"></script>
</body>
</html>
